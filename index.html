<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nick Juliane | Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial;
}

/* Chat Button */
#chatToggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
}

/* Chat Box */
#chatBox {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    overflow: hidden;
    z-index: 999;
}

#chatHeader {
    background: #0d6efd;
    color: white;
    padding: 10px;
}

#chatMessages {
    height: 280px;
    overflow-y: auto;
    padding: 10px;
    font-size: 14px;
}

#chatMessages div {
    margin-bottom: 10px;
}
</style>
</head>
<body>

<!-- SIMPLE PORTFOLIO -->
<div class="container text-center mt-5">
    <h1>Hi, I'm Nick Juliane</h1>
    <p>Laravel Developer | System Developer</p>
</div>

<!-- 🔹 CHAT BUTTON -->
<button id="chatToggle" class="btn btn-primary">💬 Chat</button>

<!-- 🔹 CHAT BOX -->
<div id="chatBox">

    <div id="chatHeader">
        AI Assistant
    </div>

    <div id="chatMessages"></div>

    <div class="p-2 d-flex">
        <input id="chatInput" class="form-control me-2" placeholder="Ask something...">
        <button onclick="sendMessage()" class="btn btn-primary">Send</button>
    </div>

</div>

<script>
const API_KEY = "AIzaSyAWZlBce5ob59wFIZEFUE2GChkXTmG4ljs"; // 🔥 PUT YOUR KEY HERE

const chatToggle = document.getElementById("chatToggle");
const chatBox = document.getElementById("chatBox");
const chatMessages = document.getElementById("chatMessages");

chatToggle.onclick = () => {
    chatBox.style.display = chatBox.style.display === "none" ? "block" : "none";
};

function addMessage(text, sender) {
    const msg = document.createElement("div");

    if (sender === "user") {
        msg.innerHTML = "<b>You:</b> " + text;
    } else {
        msg.innerHTML = "<b>AI:</b> " + text;
    }

    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("chatInput");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: message }]
                    }]
                })
            }
        );

        const data = await response.json();

        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

        addMessage(reply, "ai");

    } catch (error) {
        addMessage("Error connecting to AI", "ai");
    }
}
</script>

</body>
</html>
